<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Impressão - Etiquetas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
    <link rel="shortcut icon" href="data:image/x-icon,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ITENS_POR_PAGINA = 20;
        const LETRAS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const MESES = [
            { valor: 1, nome: 'Janeiro' }, { valor: 2, nome: 'Fevereiro' }, { valor: 3, nome: 'Março' },
            { valor: 4, nome: 'Abril' }, { valor: 5, nome: 'Maio' }, { valor: 6, nome: 'Junho' },
            { valor: 7, nome: 'Julho' }, { valor: 8, nome: 'Agosto' }, { valor: 9, nome: 'Setembro' },
            { valor: 10, nome: 'Outubro' }, { valor: 11, nome: 'Novembro' }, { valor: 12, nome: 'Dezembro' }
        ];

        // Aceita "DD/MM/AAAA" (padrão Excel BR) ou "AAAA-MM-DD" (ISO)
        const parseAdmissao = (dataStr) => {
            if (!dataStr) return { ano: null, mes: null };
            const partes = dataStr.split(/[\/\-]/);
            if (partes.length !== 3) return { ano: null, mes: null };
            const [a, b, c] = partes;
            const [diaStr, mesStr, anoStr] = a.length === 4 ? [c, b, a] : [a, b, c];
            const mes = parseInt(mesStr, 10);
            const ano = parseInt(anoStr, 10);
            return { ano: isNaN(ano) ? null : ano, mes: isNaN(mes) ? null : mes };
        };

        // Notificação flutuante (substitui alert() nativo)
        function Toast({ aviso, onFechar }) {
            useEffect(() => {
                if (!aviso) return;
                const t = setTimeout(onFechar, 4000);
                return () => clearTimeout(t);
            }, [aviso]);
            if (!aviso) return null;
            const cor = aviso.tipo === 'erro' ? 'bg-red-600' : 'bg-green-600';
            return (
                <div className={`fixed top-4 right-4 z-[60] ${cor} text-white px-4 py-3 rounded shadow-lg max-w-sm text-sm font-medium`} role="status" aria-live="polite">
                    {aviso.texto}
                </div>
            );
        }

        // Confirmação modal (substitui window.confirm() nativo)
        function ModalConfirmacao({ aberto, titulo, mensagem, textoConfirmar, onConfirmar, onCancelar }) {
            if (!aberto) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={e => e.target === e.currentTarget && onCancelar()}>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
                        <h2 className="text-lg font-bold text-gray-800 mb-3">{titulo}</h2>
                        <div className="text-sm text-gray-600 mb-5 whitespace-pre-line max-h-60 overflow-auto">{mensagem}</div>
                        <div className="flex gap-2 justify-end">
                            <button onClick={onCancelar} className="px-4 py-2 rounded text-sm text-gray-600 hover:bg-gray-100 font-medium transition">Cancelar</button>
                            <button onClick={onConfirmar} className="px-4 py-2 rounded text-sm bg-blue-600 hover:bg-blue-700 text-white font-semibold transition">{textoConfirmar || 'Confirmar'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        // Detalhes completos do servidor (dados vindos da planilha do Excel)
        function ModalDetalhes({ item, onFechar }) {
            if (!item) return null;
            const corStatus = item.status === 'Impresso' ? 'bg-green-100 text-green-700'
                : item.status === 'Na fila' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700';
            const Linha = ({ rotulo, valor, mono }) => (
                <div className="flex flex-col py-2 border-b last:border-b-0">
                    <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{rotulo}</span>
                    <span className={`text-gray-800 ${mono ? 'font-mono' : ''}`}>{valor || '—'}</span>
                </div>
            );
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={e => e.target === e.currentTarget && onFechar()}>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
                        <div className="flex items-start justify-between mb-4">
                            <h2 className="text-lg font-bold text-gray-800">Dados do servidor</h2>
                            <button onClick={onFechar} aria-label="Fechar" className="text-gray-400 hover:text-gray-700 text-xl leading-none">×</button>
                        </div>
                        <Linha rotulo="Nome" valor={item.nome} />
                        <Linha rotulo="Matrícula" valor={item.matricula} mono />
                        <Linha rotulo="CPF" valor={item.cpf} mono />
                        <Linha rotulo="Data de admissão" valor={item.dataAdmissao} />
                        <div className="flex flex-col py-2">
                            <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Status</span>
                            <span><span className={`px-2 py-1 rounded text-xs font-bold ${corStatus}`}>{item.status}</span></span>
                        </div>
                        <div className="flex justify-end mt-4">
                            <button onClick={onFechar} className="px-4 py-2 rounded text-sm bg-blue-600 hover:bg-blue-700 text-white font-semibold transition">Fechar</button>
                        </div>
                    </div>
                </div>
            );
        }

        function Paginacao({ paginaAtual, totalPaginas, onChange }) {
            if (totalPaginas <= 1) return null;
            const janela = 2;
            const paginas = [];
            for (let p = 1; p <= totalPaginas; p++) {
                if (p === 1 || p === totalPaginas || (p >= paginaAtual - janela && p <= paginaAtual + janela)) {
                    paginas.push(p);
                } else if (paginas[paginas.length - 1] !== '...') {
                    paginas.push('...');
                }
            }
            return (
                <div className="flex items-center gap-1">
                    <button
                        onClick={() => onChange(paginaAtual - 1)}
                        disabled={paginaAtual === 1}
                        className="px-3 py-1.5 rounded border bg-white disabled:opacity-40 disabled:cursor-not-allowed hover:bg-gray-50"
                    >‹</button>
                    {paginas.map((p, idx) => p === '...' ? (
                        <span key={`dots-${idx}`} className="px-2 text-gray-400">…</span>
                    ) : (
                        <button
                            key={p}
                            onClick={() => onChange(p)}
                            className={`px-3 py-1.5 rounded border text-sm font-medium ${p === paginaAtual ? 'bg-blue-600 text-white border-blue-600' : 'bg-white hover:bg-gray-50'}`}
                        >{p}</button>
                    ))}
                    <button
                        onClick={() => onChange(paginaAtual + 1)}
                        disabled={paginaAtual === totalPaginas}
                        className="px-3 py-1.5 rounded border bg-white disabled:opacity-40 disabled:cursor-not-allowed hover:bg-gray-50"
                    >›</button>
                </div>
            );
        }

        function Login({ onLogin }) {
            const [email, setEmail] = useState('');
            const [senha, setSenha] = useState('');
            const [erro, setErro] = useState('');
            const [enviando, setEnviando] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErro('');
                setEnviando(true);
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, senha })
                    });
                    const json = await res.json();
                    if (json.success) {
                        onLogin(json.token);
                    } else {
                        setErro(json.error || 'Não foi possível entrar.');
                    }
                } catch (error) {
                    setErro('Erro ao conectar com o servidor.');
                }
                setEnviando(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 p-4">
                    <form onSubmit={handleSubmit} className="bg-white/95 backdrop-blur p-8 rounded-2xl shadow-xl shadow-slate-300/40 border border-white/60 w-full max-w-sm">
                        <div className="flex flex-col items-center text-center mb-6">
                            <img src="/acaps.png" alt="ACAPS" className="h-20 w-auto object-contain mb-3 drop-shadow" />
                            <h1 className="text-xl font-extrabold text-slate-800 tracking-tight">Painel de Impressão</h1>
                            <p className="text-slate-500 text-sm mt-1">Identificação Funcional · GAO/ACAPS</p>
                        </div>
                        {erro && <div className="bg-red-50 text-red-600 text-sm p-2 rounded mb-4">{erro}</div>}
                        <label className="block text-sm font-medium text-gray-600 mb-1">E-mail</label>
                        <input
                            type="email"
                            required
                            autoFocus
                            className="border p-2 rounded w-full mb-4"
                            value={email}
                            onChange={e => setEmail(e.target.value)}
                        />
                        <label className="block text-sm font-medium text-gray-600 mb-1">Senha</label>
                        <input
                            type="password"
                            required
                            className="border p-2 rounded w-full mb-6"
                            value={senha}
                            onChange={e => setSenha(e.target.value)}
                        />
                        <button
                            type="submit"
                            disabled={enviando}
                            className="bg-blue-600 hover:bg-blue-700 text-white w-full py-2 rounded font-medium transition disabled:opacity-50"
                        >
                            {enviando ? 'Entrando...' : 'Entrar'}
                        </button>
                    </form>
                </div>
            );
        }

        function Dashboard({ chamarApi, perfil }) {
            const [dados, setDados] = useState([]);
            const [selecionados, setSelecionados] = useState([]);
            const [confirmandoReset, setConfirmandoReset] = useState(false);
            const [resetando, setResetando] = useState(false);
            const [confirmandoLimpar, setConfirmandoLimpar] = useState(false);
            const [limpando, setLimpando] = useState(false);
            const [busca, setBusca] = useState('');
            const [filtroStatus, setFiltroStatus] = useState('Todos');
            const [filtroAnos, setFiltroAnos] = useState([]);
            const [filtroMes, setFiltroMes] = useState('Todos');
            const [filtroLetra, setFiltroLetra] = useState('Todos');
            const [paginaAtual, setPaginaAtual] = useState(1);
            const [loading, setLoading] = useState(false);
            const [aviso, setAviso] = useState(null);
            const [confirmReimprimir, setConfirmReimprimir] = useState(null);
            const [detalhe, setDetalhe] = useState(null);

            // chamarApi (com tratamento de 401) vem do App; um 401 dispara logout em qualquer chamada.
            const ehSessaoExpirada = (e) => e && e.message && e.message.includes('Sessão');

            // Carrega os dados salvos no Supabase ao abrir o programa
            useEffect(() => {
                chamarApi('/api/dados')
                    .then(res => res.json())
                    .then(data => setDados(Array.isArray(data) ? data : []))
                    .catch(() => {});
            }, []);

            // Upload de nova planilha
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true);
                try {
                    const conteudoBase64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

                    const res = await chamarApi('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ conteudoBase64 })
                    });
                    const json = await res.json();
                    if (json.success) {
                        setDados(json.dados);
                        setSelecionados([]);
                        limparFiltros();
                        setAviso({ tipo: 'sucesso', texto: 'Planilha carregada e dados atualizados com sucesso!' });

                        // A planilha pode trazer gente que já tinha sido impressa (ou estava na fila) antes,
                        // casado por CPF/Matrícula — pergunta via modal se deseja reimprimir.
                        if (json.jaImpressos && json.jaImpressos.length > 0) {
                            setConfirmReimprimir({
                                total: json.jaImpressos.length,
                                nomes: json.jaImpressos.map(p => p.nome),
                                ids: json.jaImpressos.map(p => p.id)
                            });
                        }
                    } else {
                        setAviso({ tipo: 'erro', texto: json.error || 'Não foi possível processar a planilha.' });
                    }
                } catch (error) {
                    if (!ehSessaoExpirada(error)) setAviso({ tipo: 'erro', texto: 'Erro ao enviar arquivo.' });
                }
                setLoading(false);
                e.target.value = null; // Reseta o input
            };

            // Confirmação (via modal) de reimpressão de quem já constava impresso/na fila
            const confirmarReimpressao = async () => {
                if (!confirmReimprimir) return;
                try {
                    const res = await chamarApi('/api/marcar-pendente', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ids: confirmReimprimir.ids })
                    });
                    const json = await res.json();
                    if (json.success) {
                        setDados(json.dados);
                        setAviso({ tipo: 'sucesso', texto: 'Registros marcados como Pendente para reimpressão.' });
                    }
                } catch (error) {
                    if (!ehSessaoExpirada(error)) setAviso({ tipo: 'erro', texto: 'Erro ao marcar para reimpressão.' });
                }
                setConfirmReimprimir(null);
            };

            // Filtro-base: texto, status e mês (dimensões compartilhadas pelos recortes de Ano e Letra abaixo)
            const dadosBase = useMemo(() => {
                return dados.filter(item => {
                    const matchBusca = (item.nome + item.matricula + item.cpf).toLowerCase().includes(busca.toLowerCase());
                    const matchStatus = filtroStatus === 'Todos' || item.status === filtroStatus;
                    const { mes } = parseAdmissao(item.dataAdmissao);
                    const matchMes = filtroMes === 'Todos' || mes === Number(filtroMes);
                    return matchBusca && matchStatus && matchMes;
                });
            }, [dados, busca, filtroStatus, filtroMes]);

            // Anos disponíveis = dadosBase já considerando a Letra ativa (exclui só o próprio filtro de Ano)
            const anosDisponiveis = useMemo(() => {
                const anos = new Set();
                dadosBase.forEach(item => {
                    if (filtroLetra !== 'Todos' && !(item.nome || '').trim().toUpperCase().startsWith(filtroLetra)) return;
                    const { ano } = parseAdmissao(item.dataAdmissao);
                    if (ano) anos.add(ano);
                });
                return Array.from(anos).sort((a, b) => b - a);
            }, [dadosBase, filtroLetra]);

            // dadosBase + filtro de Ano (um ou vários anos podem estar selecionados)
            const dadosSemLetra = useMemo(() => {
                if (filtroAnos.length === 0) return dadosBase;
                return dadosBase.filter(item => {
                    const { ano } = parseAdmissao(item.dataAdmissao);
                    return filtroAnos.includes(ano);
                });
            }, [dadosBase, filtroAnos]);

            // Letras disponíveis = dadosSemLetra (já tem busca+status+mês+ano, falta só a Letra)
            const letrasDisponiveis = useMemo(() => {
                const letras = new Set();
                dadosSemLetra.forEach(item => {
                    const inicial = (item.nome || '').trim().charAt(0).toUpperCase();
                    if (inicial) letras.add(inicial);
                });
                return letras;
            }, [dadosSemLetra]);

            // Filtro final (acrescenta a letra inicial do nome)
            const dadosFiltrados = useMemo(() => {
                if (filtroLetra === 'Todos') return dadosSemLetra;
                return dadosSemLetra.filter(item => (item.nome || '').trim().toUpperCase().startsWith(filtroLetra));
            }, [dadosSemLetra, filtroLetra]);

            const toggleAno = (ano) => {
                setFiltroAnos(prev => prev.includes(ano) ? prev.filter(a => a !== ano) : [...prev, ano]);
            };

            const filtrosAtivos = busca !== '' || filtroStatus !== 'Todos' || filtroAnos.length > 0 || filtroMes !== 'Todos' || filtroLetra !== 'Todos';

            const limparFiltros = () => {
                setBusca('');
                setFiltroStatus('Todos');
                setFiltroAnos([]);
                setFiltroMes('Todos');
                setFiltroLetra('Todos');
            };

            // Sempre que um filtro muda, volta para a primeira página
            useEffect(() => {
                setPaginaAtual(1);
            }, [busca, filtroStatus, filtroAnos, filtroMes, filtroLetra]);

            // Paginação (20 por página)
            const totalPaginas = Math.max(1, Math.ceil(dadosFiltrados.length / ITENS_POR_PAGINA));

            useEffect(() => {
                if (paginaAtual > totalPaginas) setPaginaAtual(totalPaginas);
            }, [totalPaginas, paginaAtual]);

            const dadosPaginados = useMemo(() => {
                const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
                return dadosFiltrados.slice(inicio, inicio + ITENS_POR_PAGINA);
            }, [dadosFiltrados, paginaAtual]);

            const inicioExibicao = dadosFiltrados.length === 0 ? 0 : (paginaAtual - 1) * ITENS_POR_PAGINA + 1;
            const fimExibicao = Math.min(paginaAtual * ITENS_POR_PAGINA, dadosFiltrados.length);

            // Lógica de Seleção (o "selecionar todos" age sobre a página atual, que já é o lote de impressão)
            const idsDaPagina = dadosPaginados.map(i => i.id);
            const todosDaPaginaSelecionados = idsDaPagina.length > 0 && idsDaPagina.every(id => selecionados.includes(id));

            const toggleItem = (id) => {
                setSelecionados(prev =>
                    prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
                );
            };

            const toggleTodos = () => {
                if (todosDaPaginaSelecionados) {
                    setSelecionados(prev => prev.filter(id => !idsDaPagina.includes(id)));
                } else {
                    setSelecionados(prev => Array.from(new Set([...prev, ...idsDaPagina])));
                }
            };

            // Envio para a Impressora
            const handleImprimir = async () => {
                if (selecionados.length === 0) return setAviso({ tipo: 'erro', texto: 'Selecione ao menos um registro.' });
                if (selecionados.length > 20) return setAviso({ tipo: 'erro', texto: 'Selecione no máximo 20 etiquetas por lote para não sobrecarregar a memória da impressora.' });

                setLoading(true);
                try {
                    const res = await chamarApi('/api/imprimir', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ idsParaImprimir: selecionados })
                    });
                    const json = await res.json();

                    if (json.success) {
                        // A Vercel só enfileira — o agente local na rede da impressora é quem imprime de fato
                        setDados(prev => prev.map(item =>
                            selecionados.includes(item.id) ? { ...item, status: 'Na fila' } : item
                        ));
                        setSelecionados([]);
                        setAviso({ tipo: 'sucesso', texto: 'Lote enviado para a fila! O agente local vai imprimir em breve.' });
                    } else {
                        setAviso({ tipo: 'erro', texto: json.error || 'Não foi possível enfileirar a impressão.' });
                    }
                } catch (error) {
                    if (!ehSessaoExpirada(error)) setAviso({ tipo: 'erro', texto: 'Erro ao comunicar com o servidor de impressão.' });
                }
                setLoading(false);
            };

            const handleLimparDados = async () => {
                setLimpando(true);
                try {
                    const res = await chamarApi('/api/limpar-dados', { method: 'POST' });
                    const json = await res.json();
                    if (json.success) { setDados([]); setSelecionados([]); setAviso({ tipo: 'sucesso', texto: 'Dados apagados.' }); }
                } catch (error) {
                    if (!ehSessaoExpirada(error)) setAviso({ tipo: 'erro', texto: 'Erro ao apagar os dados.' });
                }
                setLimpando(false);
                setConfirmandoLimpar(false);
            };

            const handleReset = async () => {
                setResetando(true);
                try {
                    const res = await chamarApi('/api/resetar-impressoes', { method: 'POST' });
                    const json = await res.json();
                    if (json.success) { setDados(json.dados); setSelecionados([]); setAviso({ tipo: 'sucesso', texto: 'Histórico zerado: todos voltaram a Pendente.' }); }
                } catch (error) {
                    if (!ehSessaoExpirada(error)) setAviso({ tipo: 'erro', texto: 'Erro ao resetar o histórico.' });
                }
                setResetando(false);
                setConfirmandoReset(false);
            };

            // Contadores do conjunto FILTRADO (o que o filtro trouxe = o que pode ir para impressão).
            // Quando não há filtro ativo, dadosFiltrados === todos os dados, então mostra o total geral.
            const totalFiltrados = dadosFiltrados.length;
            const filtPendentes = dadosFiltrados.filter(d => d.status === 'Pendente').length;
            const filtNaFila = dadosFiltrados.filter(d => d.status === 'Na fila').length;
            const filtImpressos = dadosFiltrados.filter(d => d.status === 'Impresso').length;
            // Quantos lotes de 20 para imprimir todos os pendentes do filtro (limite da impressora)
            const lotesPendentes = Math.ceil(filtPendentes / 20);

            return (
                <div className="max-w-7xl mx-auto">
                    {/* Cabeçalho */}
                    <div className="flex justify-between items-center mb-6 bg-white p-5 rounded-xl shadow-sm border border-slate-200 relative overflow-hidden">
                        <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 via-indigo-500 to-blue-600"></div>
                        <div className="flex items-center gap-4">
                            <img src="/acaps.png" alt="ACAPS" className="h-12 w-auto object-contain shrink-0 drop-shadow-sm" />
                            <div>
                                <h1 className="text-xl font-extrabold text-slate-800 tracking-tight">Painel de Impressão de Identificação</h1>
                                <p className="text-slate-500 text-sm mt-0.5">Zebra TLP/GC Series · Porta 9100</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {perfil?.role === 'admin' && (
                                confirmandoLimpar ? (
                                    <div className="flex items-center gap-2 bg-red-50 border border-red-200 rounded px-3 py-1.5">
                                        <span className="text-red-700 text-sm font-medium">Apaga todos os dados.</span>
                                        <button onClick={() => setConfirmandoLimpar(false)} className="text-xs text-gray-500 hover:text-gray-700 font-medium px-2 py-1 rounded hover:bg-gray-100">Cancelar</button>
                                        <button onClick={handleLimparDados} disabled={limpando} className="text-xs bg-red-600 hover:bg-red-700 text-white font-semibold px-3 py-1 rounded transition disabled:opacity-50">
                                            {limpando ? 'Apagando...' : 'Confirmar'}
                                        </button>
                                    </div>
                                ) : confirmandoReset ? (
                                    <div className="flex items-center gap-2 bg-orange-50 border border-orange-200 rounded px-3 py-1.5">
                                        <span className="text-orange-700 text-sm font-medium">Todos voltam a Pendente.</span>
                                        <button onClick={() => setConfirmandoReset(false)} className="text-xs text-gray-500 hover:text-gray-700 font-medium px-2 py-1 rounded hover:bg-gray-100">Cancelar</button>

        function ModalTrocarSenha({ chamarApi, onFechar }) {
            const [novaSenha, setNovaSenha] = useState('');
            const [confirmar, setConfirmar] = useState('');
            const [erro, setErro] = useState('');
            const [sucesso, setSucesso] = useState(false);
            const [salvando, setSalvando] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (novaSenha.length < 8) { setErro('Mínimo 8 caracteres.'); return; }
                if (novaSenha !== confirmar) { setErro('As senhas não coincidem.'); return; }
                setSalvando(true); setErro('');
                try {
                    const res = await chamarApi('/api/perfil/trocar-senha', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ novaSenha })
                    });
                    const json = await res.json();
                    if (json.success) { setSucesso(true); setTimeout(onFechar, 1800); }
                    else setErro(json.error || 'Erro ao trocar senha.');
                } catch (e) { if (!(e && e.message && e.message.includes('Sessão'))) setErro('Erro ao conectar com o servidor.'); }
                setSalvando(false);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={e => e.target === e.currentTarget && onFechar()}>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6">
                        <h2 className="text-lg font-bold text-gray-800 mb-4">Trocar Senha</h2>
                        {sucesso ? (
                            <div className="text-center py-6">
                                <div className="text-green-500 text-4xl mb-3">✓</div>
                                <p className="text-green-700 font-semibold">Senha alterada com sucesso!</p>
                            </div>
                        ) : (
                            <form onSubmit={handleSubmit}>
                                {erro && <div className="bg-red-50 text-red-600 text-sm p-3 rounded mb-4">{erro}</div>}
                                <label className="block text-sm font-medium text-gray-600 mb-1">Nova senha</label>
                                <input type="password" required minLength={8} autoFocus className="border p-2 rounded w-full mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400" value={novaSenha} onChange={e => setNovaSenha(e.target.value)} />
                                <label className="block text-sm font-medium text-gray-600 mb-1">Confirmar nova senha</label>
                                <input type="password" required minLength={8} className="border p-2 rounded w-full mb-5 focus:outline-none focus:ring-2 focus:ring-blue-400" value={confirmar} onChange={e => setConfirmar(e.target.value)} />
                                <div className="flex gap-2 justify-end">
                                    <button type="button" onClick={onFechar} className="px-4 py-2 rounded text-sm text-gray-600 hover:bg-gray-100 transition font-medium">Cancelar</button>
                                    <button type="submit" disabled={salvando} className="px-4 py-2 rounded text-sm bg-blue-600 hover:bg-blue-700 text-white font-semibold transition disabled:opacity-50">
                                        {salvando ? 'Salvando...' : 'Salvar'}
                                    </button>
                                </div>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        function TrocarSenha({ chamarApi, onTrocou }) {
            const [novaSenha, setNovaSenha] = useState('');
            const [confirmar, setConfirmar] = useState('');
            const [erro, setErro] = useState('');
            const [salvando, setSalvando] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (novaSenha.length < 8) { setErro('Mínimo 8 caracteres.'); return; }
                if (novaSenha !== confirmar) { setErro('As senhas não coincidem.'); return; }
                setSalvando(true);
                try {
                    const res = await chamarApi('/api/perfil/trocar-senha', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ novaSenha })
                    });
                    const json = await res.json();
                    if (json.success) onTrocou();
                    else setErro(json.error || 'Erro ao trocar senha.');
                } catch (e) { if (!(e && e.message && e.message.includes('Sessão'))) setErro('Erro ao conectar com o servidor.'); }
                setSalvando(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100">
                    <form onSubmit={handleSubmit} className="bg-white p-8 rounded-lg shadow w-full max-w-sm">
                        <h1 className="text-xl font-bold text-gray-800 mb-1">Primeiro acesso</h1>
                        <p className="text-gray-500 text-sm mb-6">Por segurança, defina uma nova senha antes de continuar.</p>
                        {erro && <div className="bg-red-50 text-red-600 text-sm p-2 rounded mb-4">{erro}</div>}
                        <label className="block text-sm font-medium text-gray-600 mb-1">Nova senha</label>
                        <input type="password" required minLength={8} autoFocus className="border p-2 rounded w-full mb-4" value={novaSenha} onChange={e => setNovaSenha(e.target.value)} />
                        <label className="block text-sm font-medium text-gray-600 mb-1">Confirmar senha</label>
                        <input type="password" required minLength={8} className="border p-2 rounded w-full mb-6" value={confirmar} onChange={e => setConfirmar(e.target.value)} />
                        <button type="submit" disabled={salvando} className="bg-blue-600 hover:bg-blue-700 text-white w-full py-2 rounded font-medium transition disabled:opacity-50">
                            {salvando ? 'Salvando...' : 'Definir senha e entrar'}
                        </button>
                    </form>
                </div>
            );
        }

        function GerenciarUsuarios({ chamarApi }) {
            const [usuarios, setUsuarios] = useState([]);
            const [loading, setLoading] = useState(true);
            const [criarEmail, setCriarEmail] = useState('');
            const [criando, setCriando] = useState(false);
            const [mensagem, setMensagem] = useState(null);

            useEffect(() => {
                chamarApi('/api/usuarios/listar').then(r => r.json()).then(d => { setUsuarios(d.usuarios || []); setLoading(false); }).catch(() => setLoading(false));
            }, []);

            const criarUsuario = async (e) => {
                e.preventDefault();
                setCriando(true); setMensagem(null);
                try {
                    const res = await chamarApi('/api/usuarios/criar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: criarEmail }) });
                    const json = await res.json();
                    if (json.success) {
                        setMensagem({ tipo: 'sucesso', texto: `Usuário criado! Senha temporária: ${json.senhaTemporaria}` });
                        setCriarEmail('');
                        setUsuarios(prev => [...prev, json.usuario]);
                    } else {
                        setMensagem({ tipo: 'erro', texto: json.error || 'Erro ao criar usuário.' });
                    }
                } catch (e) {
                    if (!(e && e.message && e.message.includes('Sessão'))) setMensagem({ tipo: 'erro', texto: 'Erro ao conectar com o servidor.' });
                }
                setCriando(false);
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <h2 className="text-xl font-bold text-gray-800 mb-6">Gerenciar Usuários</h2>

                        )}
                        <div className="flex gap-3">

                            <button type="submit" disabled={criando} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded font-medium transition disabled:opacity-50">
                                {criando ? 'Criando...' : '+ Criar'}
                            </button>
                        </div>
                    </form>
                    <div className="bg-white rounded-lg shadow overflow-hidden border">
                        <table className="min-w-full text-sm">
                            <thead className="bg-gray-50 border-b">
                                <tr>
                                    <th className="p-4 text-left font-semibold">E-mail</th>
                                    <th className="p-4 text-left font-semibold">Perfil</th>
                                    <th className="p-4 text-left font-semibold">1° acesso</th>
                                    <th className="p-4 text-left font-semibold">Criado em</th>
                                </tr>

                                {loading ? (
                                    <tr><td colSpan="4" className="p-8 text-center text-gray-400">Carregando...</td></tr>
                                ) : usuarios.map(u => (

                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'}`}>
                                                {u.role === 'admin' ? '★ Admin' : 'Usuário'}

                                        <td className="p-4">
                                            <span className={`text-xs font-semibold ${u.force_password_change ? 'text-yellow-600' : 'text-green-600'}`}>

                                            </span>

                                        <td className="p-4 text-gray-500">{new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function Logs({ chamarApi }) {
            const [logs, setLogs] = useState([]);

            useEffect(() => {

            }, []);

            const BADGE = { login: 'bg-blue-100 text-blue-700', login_falha: 'bg-red-100 text-red-700', upload_planilha: 'bg-yellow-100 text-yellow-700', impressao_lote: 'bg-green-100 text-green-700', criar_usuario: 'bg-purple-100 text-purple-700', trocar_senha: 'bg-orange-100 text-orange-700', marcar_pendente: 'bg-red-100 text-red-700', resetar_impressoes: 'bg-orange-100 text-orange-700', limpar_dados: 'bg-gray-200 text-gray-700' };
            const LABEL = { login: 'Login', login_falha: 'Login falhou', upload_planilha: 'Upload planilha', impressao_lote: 'Impressão lote', criar_usuario: 'Criar usuário', trocar_senha: 'Trocar senha', marcar_pendente: 'Marcar pendente', resetar_impressoes: 'Reset histórico', limpar_dados: 'Limpar dados' };

            return (
                <div className="max-w-7xl mx-auto p-6">
                    <h2 className="text-xl font-bold text-gray-800 mb-6">Logs do Sistema</h2>
                    <div className="bg-white rounded-lg shadow overflow-hidden border">
                        <table className="min-w-full text-sm">
                            <thead className="bg-gray-50 border-b">
                                <tr>
                                    <th className="p-4 text-left font-semibold">Data/Hora</th>
                                    <th className="p-4 text-left font-semibold">Usuário</th>
                                    <th className="p-4 text-left font-semibold">Ação</th>
                                    <th className="p-4 text-left font-semibold">Detalhes</th>
                                    <th className="p-4 text-left font-semibold">IP</th>
                                </tr>
                            </thead>
                            <tbody>
                                {loading ? (
                                    <tr><td colSpan="5" className="p-8 text-center text-gray-400">Carregando...</td></tr>
                                ) : logs.length === 0 ? (
                                    <tr><td colSpan="5" className="p-8 text-center text-gray-400">Nenhum log registrado ainda.</td></tr>
                                ) : logs.map(log => (
                                    <tr key={log.id} className="border-b hover:bg-gray-50">
                                        <td className="p-4 text-gray-500 whitespace-nowrap">{new Date(log.criado_em).toLocaleString('pt-BR')}</td>
                                        <td className="p-4">{log.user_email || '—'}</td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${BADGE[log.acao] || 'bg-gray-100 text-gray-600'}`}>
                                                {LABEL[log.acao] || log.acao}
                                            </span>
                                        </td>
                                        <td className="p-4 text-gray-500 max-w-xs truncate">
                                            {log.detalhes && Object.keys(log.detalhes).length > 0
                                                ? Object.entries(log.detalhes).map(([k, v]) => `${k}: ${v}`).join(' | ')
                                                : '—'}
                                        </td>
                                        <td className="p-4 text-gray-400 text-xs font-mono">{log.ip || '—'}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [token, setToken] = useState(() => sessionStorage.getItem('token') || null);
            const [perfil, setPerfil] = useState(null);
            const [secao, setSecao] = useState('dashboard');
            const [mostrarTrocarSenha, setMostrarTrocarSenha] = useState(false);

            const handleLogin = (novoToken) => {
                sessionStorage.setItem('token', novoToken);
                setToken(novoToken);
            };

            const handleLogout = () => {
                sessionStorage.removeItem('token');
                setToken(null);
                setPerfil(null);
            };

            // Wrapper único de chamada à API: anexa o token e desloga automaticamente em 401
            // (RF01.3) — usado por todas as telas para um comportamento de sessão consistente.
            const chamarApi = async (url, opcoes = {}) => {
                const res = await fetch(url, {
                    ...opcoes,
                    headers: { ...(opcoes.headers || {}), Authorization: `Bearer ${token}` }
                });
                if (res.status === 401) {
                    handleLogout();
                    throw new Error('Sessão expirada. Faça login novamente.');
                }
                return res;
            };

            useEffect(() => {
                if (!token) { setPerfil(null); return; }
                chamarApi('/api/perfil/meu')
                    .then(r => r.json())
                    .then(data => { if (data) setPerfil(data); })
                    .catch(() => {});
            }, [token]);

            if (!token) return <Login onLogin={handleLogin} />;
            if (!perfil) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100">
                    <p className="text-gray-400 text-sm">Carregando...</p>
                </div>
            );
            if (perfil.force_password_change) return (
                <TrocarSenha chamarApi={chamarApi} onTrocou={() => setPerfil({ ...perfil, force_password_change: false })} />
            );

            return (
                <div className="min-h-screen bg-gray-100">
                    <NavBar perfil={perfil} secao={secao} setSecao={setSecao} onLogout={handleLogout} onTrocarSenha={() => setMostrarTrocarSenha(true)} />
                    {mostrarTrocarSenha && <ModalTrocarSenha chamarApi={chamarApi} onFechar={() => setMostrarTrocarSenha(false)} />}
                    {secao === 'dashboard' && <Dashboard chamarApi={chamarApi} perfil={perfil} />}
                    {secao === 'usuarios' && perfil.role === 'admin' && <GerenciarUsuarios chamarApi={chamarApi} />}
                    {secao === 'logs' && perfil.role === 'admin' && <Logs chamarApi={chamarApi} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
