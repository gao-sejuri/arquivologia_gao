<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Impressão - Etiquetas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ITENS_POR_PAGINA = 50;
        const LETRAS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const MESES = [
            { valor: 1, nome: 'Janeiro' }, { valor: 2, nome: 'Fevereiro' }, { valor: 3, nome: 'Março' },
            { valor: 4, nome: 'Abril' }, { valor: 5, nome: 'Maio' }, { valor: 6, nome: 'Junho' },
            { valor: 7, nome: 'Julho' }, { valor: 8, nome: 'Agosto' }, { valor: 9, nome: 'Setembro' },
            { valor: 10, nome: 'Outubro' }, { valor: 11, nome: 'Novembro' }, { valor: 12, nome: 'Dezembro' }
        ];

        // Aceita "DD/MM/AAAA" (padrão Excel BR) ou "AAAA-MM-DD" (ISO)
        const parseAdmissao = (dataStr) => {
            if (!dataStr) return { ano: null, mes: null };
            const partes = dataStr.split(/[\/\-]/);
            if (partes.length !== 3) return { ano: null, mes: null };
            const [a, b, c] = partes;
            const [diaStr, mesStr, anoStr] = a.length === 4 ? [c, b, a] : [a, b, c];
            const mes = parseInt(mesStr, 10);
            const ano = parseInt(anoStr, 10);
            return { ano: isNaN(ano) ? null : ano, mes: isNaN(mes) ? null : mes };
        };

        function Paginacao({ paginaAtual, totalPaginas, onChange }) {
            if (totalPaginas <= 1) return null;
            const janela = 2;
            const paginas = [];
            for (let p = 1; p <= totalPaginas; p++) {
                if (p === 1 || p === totalPaginas || (p >= paginaAtual - janela && p <= paginaAtual + janela)) {
                    paginas.push(p);
                } else if (paginas[paginas.length - 1] !== '...') {
                    paginas.push('...');
                }
            }
            return (
                <div className="flex items-center gap-1">
                    <button
                        onClick={() => onChange(paginaAtual - 1)}
                        disabled={paginaAtual === 1}
                        className="px-3 py-1.5 rounded border bg-white disabled:opacity-40 disabled:cursor-not-allowed hover:bg-gray-50"
                    >‹</button>
                    {paginas.map((p, idx) => p === '...' ? (
                        <span key={`dots-${idx}`} className="px-2 text-gray-400">…</span>
                    ) : (
                        <button
                            key={p}
                            onClick={() => onChange(p)}
                            className={`px-3 py-1.5 rounded border text-sm font-medium ${p === paginaAtual ? 'bg-blue-600 text-white border-blue-600' : 'bg-white hover:bg-gray-50'}`}
                        >{p}</button>
                    ))}
                    <button
                        onClick={() => onChange(paginaAtual + 1)}
                        disabled={paginaAtual === totalPaginas}
                        className="px-3 py-1.5 rounded border bg-white disabled:opacity-40 disabled:cursor-not-allowed hover:bg-gray-50"
                    >›</button>
                </div>
            );
        }

        function Login({ onLogin }) {
            const [email, setEmail] = useState('');
            const [senha, setSenha] = useState('');
            const [erro, setErro] = useState('');
            const [enviando, setEnviando] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErro('');
                setEnviando(true);
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, senha })
                    });
                    const json = await res.json();
                    if (json.success) {
                        onLogin(json.token);
                    } else {
                        setErro(json.error || 'Não foi possível entrar.');
                    }
                } catch (error) {
                    setErro('Erro ao conectar com o servidor.');
                }
                setEnviando(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center">
                    <form onSubmit={handleSubmit} className="bg-white p-8 rounded-lg shadow w-full max-w-sm">
                        <h1 className="text-xl font-bold text-gray-800 mb-1">Painel de Impressão</h1>
                        <p className="text-gray-500 text-sm mb-6">Entre com seu login para continuar.</p>
                        {erro && <div className="bg-red-50 text-red-600 text-sm p-2 rounded mb-4">{erro}</div>}
                        <label className="block text-sm font-medium text-gray-600 mb-1">E-mail</label>
                        <input
                            type="email"
                            required
                            autoFocus
                            className="border p-2 rounded w-full mb-4"
                            value={email}
                            onChange={e => setEmail(e.target.value)}
                        />
                        <label className="block text-sm font-medium text-gray-600 mb-1">Senha</label>
                        <input
                            type="password"
                            required
                            className="border p-2 rounded w-full mb-6"
                            value={senha}
                            onChange={e => setSenha(e.target.value)}
                        />
                        <button
                            type="submit"
                            disabled={enviando}
                            className="bg-blue-600 hover:bg-blue-700 text-white w-full py-2 rounded font-medium transition disabled:opacity-50"
                        >
                            {enviando ? 'Entrando...' : 'Entrar'}
                        </button>
                    </form>
                </div>
            );
        }

        function Dashboard({ token, onLogout }) {
            const [dados, setDados] = useState([]);
            const [selecionados, setSelecionados] = useState([]);
            const [busca, setBusca] = useState('');
            const [filtroStatus, setFiltroStatus] = useState('Todos');
            const [filtroAnos, setFiltroAnos] = useState([]);
            const [filtroMes, setFiltroMes] = useState('Todos');
            const [filtroLetra, setFiltroLetra] = useState('Todos');
            const [paginaAtual, setPaginaAtual] = useState(1);
            const [loading, setLoading] = useState(false);

            // Toda chamada à nossa API leva o token do Supabase Auth; em caso de 401, força novo login
            const chamarApi = async (url, opcoes = {}) => {
                const res = await fetch(url, {
                    ...opcoes,
                    headers: { ...(opcoes.headers || {}), Authorization: `Bearer ${token}` }
                });
                if (res.status === 401) {
                    onLogout();
                    throw new Error('Sessão expirada. Faça login novamente.');
                }
                return res;
            };

            // Carrega os dados salvos no Supabase ao abrir o programa
            useEffect(() => {
                chamarApi('/api/dados')
                    .then(res => res.json())
                    .then(data => setDados(data || []))
                    .catch(() => {});
            }, []);

            // Upload de nova planilha
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true);
                try {
                    const conteudoBase64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

                    const res = await chamarApi('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ conteudoBase64 })
                    });
                    const json = await res.json();
                    if (json.success) {
                        setDados(json.dados);
                        setSelecionados([]);
                        limparFiltros();

                        // A planilha pode trazer gente que já tinha sido impressa (ou estava na fila) antes, casado por CPF/Matrícula
                        if (json.jaImpressos && json.jaImpressos.length > 0) {
                            const nomes = json.jaImpressos.map(p => p.nome).join('\n- ');
                            const reimprimir = window.confirm(
                                `${json.jaImpressos.length} pessoa(s) desta planilha já constavam como IMPRESSAS ou NA FILA anteriormente:\n\n- ${nomes}\n\nDeseja marcá-las como Pendente novamente para reimprimir as etiquetas?`
                            );
                            if (reimprimir) {
                                const idsParaReimprimir = json.jaImpressos.map(p => p.id);
                                const res2 = await chamarApi('/api/marcar-pendente', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ ids: idsParaReimprimir })
                                });
                                const json2 = await res2.json();
                                if (json2.success) setDados(json2.dados);
                            }
                        }

                        alert('Planilha carregada e cofre atualizado com sucesso!');
                    } else {
                        alert(json.error);
                    }
                } catch (error) {
                    alert('Erro ao enviar arquivo.');
                }
                setLoading(false);
                e.target.value = null; // Reseta o input
            };

            // Filtro-base: texto, status e mês (dimensões compartilhadas pelos recortes de Ano e Letra abaixo)
            const dadosBase = useMemo(() => {
                return dados.filter(item => {
                    const matchBusca = (item.nome + item.matricula + item.cpf).toLowerCase().includes(busca.toLowerCase());
                    const matchStatus = filtroStatus === 'Todos' || item.status === filtroStatus;
                    const { mes } = parseAdmissao(item.dataAdmissao);
                    const matchMes = filtroMes === 'Todos' || mes === Number(filtroMes);
                    return matchBusca && matchStatus && matchMes;
                });
            }, [dados, busca, filtroStatus, filtroMes]);

            // Anos disponíveis = dadosBase já considerando a Letra ativa (exclui só o próprio filtro de Ano)
            const anosDisponiveis = useMemo(() => {
                const anos = new Set();
                dadosBase.forEach(item => {
                    if (filtroLetra !== 'Todos' && !(item.nome || '').trim().toUpperCase().startsWith(filtroLetra)) return;
                    const { ano } = parseAdmissao(item.dataAdmissao);
                    if (ano) anos.add(ano);
                });
                return Array.from(anos).sort((a, b) => b - a);
            }, [dadosBase, filtroLetra]);

            // dadosBase + filtro de Ano (um ou vários anos podem estar selecionados)
            const dadosSemLetra = useMemo(() => {
                if (filtroAnos.length === 0) return dadosBase;
                return dadosBase.filter(item => {
                    const { ano } = parseAdmissao(item.dataAdmissao);
                    return filtroAnos.includes(ano);
                });
            }, [dadosBase, filtroAnos]);

            // Letras disponíveis = dadosSemLetra (já tem busca+status+mês+ano, falta só a Letra)
            const letrasDisponiveis = useMemo(() => {
                const letras = new Set();
                dadosSemLetra.forEach(item => {
                    const inicial = (item.nome || '').trim().charAt(0).toUpperCase();
                    if (inicial) letras.add(inicial);
                });
                return letras;
            }, [dadosSemLetra]);

            // Filtro final (acrescenta a letra inicial do nome)
            const dadosFiltrados = useMemo(() => {
                if (filtroLetra === 'Todos') return dadosSemLetra;
                return dadosSemLetra.filter(item => (item.nome || '').trim().toUpperCase().startsWith(filtroLetra));
            }, [dadosSemLetra, filtroLetra]);

            const toggleAno = (ano) => {
                setFiltroAnos(prev => prev.includes(ano) ? prev.filter(a => a !== ano) : [...prev, ano]);
            };

            const filtrosAtivos = busca !== '' || filtroStatus !== 'Todos' || filtroAnos.length > 0 || filtroMes !== 'Todos' || filtroLetra !== 'Todos';

            const limparFiltros = () => {
                setBusca('');
                setFiltroStatus('Todos');
                setFiltroAnos([]);
                setFiltroMes('Todos');
                setFiltroLetra('Todos');
            };

            // Sempre que um filtro muda, volta para a primeira página
            useEffect(() => {
                setPaginaAtual(1);
            }, [busca, filtroStatus, filtroAnos, filtroMes, filtroLetra]);

            // Paginação (50 por página)
            const totalPaginas = Math.max(1, Math.ceil(dadosFiltrados.length / ITENS_POR_PAGINA));

            useEffect(() => {
                if (paginaAtual > totalPaginas) setPaginaAtual(totalPaginas);
            }, [totalPaginas, paginaAtual]);

            const dadosPaginados = useMemo(() => {
                const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
                return dadosFiltrados.slice(inicio, inicio + ITENS_POR_PAGINA);
            }, [dadosFiltrados, paginaAtual]);

            const inicioExibicao = dadosFiltrados.length === 0 ? 0 : (paginaAtual - 1) * ITENS_POR_PAGINA + 1;
            const fimExibicao = Math.min(paginaAtual * ITENS_POR_PAGINA, dadosFiltrados.length);

            // Lógica de Seleção (o "selecionar todos" age sobre a página atual, que já é o lote de impressão)
            const idsDaPagina = dadosPaginados.map(i => i.id);
            const todosDaPaginaSelecionados = idsDaPagina.length > 0 && idsDaPagina.every(id => selecionados.includes(id));

            const toggleItem = (id) => {
                setSelecionados(prev =>
                    prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
                );
            };

            const toggleTodos = () => {
                if (todosDaPaginaSelecionados) {
                    setSelecionados(prev => prev.filter(id => !idsDaPagina.includes(id)));
                } else {
                    setSelecionados(prev => Array.from(new Set([...prev, ...idsDaPagina])));
                }
            };

            // Envio para a Impressora
            const handleImprimir = async () => {
                if (selecionados.length === 0) return alert('Selecione ao menos um registro.');
                if (selecionados.length > 50) return alert('Selecione no máximo 50 etiquetas por lote para não sobrecarregar a memória da impressora.');

                setLoading(true);
                try {
                    const res = await chamarApi('/api/imprimir', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ idsParaImprimir: selecionados })
                    });
                    const json = await res.json();

                    if (json.success) {
                        // A Vercel só enfileira — o agente local na rede da impressora é quem imprime de fato
                        setDados(prev => prev.map(item =>
                            selecionados.includes(item.id) ? { ...item, status: 'Na fila' } : item
                        ));
                        setSelecionados([]);
                        alert('Lote enviado para a fila de impressão! O agente local vai imprimir em breve.');
                    } else {
                        alert(json.error);
                    }
                } catch (error) {
                    alert('Erro ao comunicar com o servidor de impressão.');
                }
                setLoading(false);
            };

            // Contadores
            const totalPendentes = dados.filter(d => d.status === 'Pendente').length;
            const totalNaFila = dados.filter(d => d.status === 'Na fila').length;
            const totalImpressos = dados.filter(d => d.status === 'Impresso').length;

            return (
                <div className="max-w-7xl mx-auto">
                    {/* Cabeçalho */}
                    <div className="flex justify-between items-center mb-6 bg-white p-6 rounded-lg shadow">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">Painel de Impressão de Identificação</h1>
                            <p className="text-gray-500 text-sm mt-1">Zebra TLP/GC Series - Porta 9100</p>
                        </div>
                        <div className="flex items-center gap-4">
                            <label className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded cursor-pointer font-medium transition">
                                {loading ? 'Carregando...' : 'Carregar Planilha (.xlsx)'}
                                <input type="file" accept=".xlsx" className="hidden" onChange={handleUpload} disabled={loading} />
                            </label>
                            <button
                                onClick={onLogout}
                                className="text-sm font-medium text-gray-400 hover:text-red-600 transition"
                            >Sair</button>
                        </div>
                    </div>

                    {/* Barra de Filtros e Resumo */}
                    <div className="flex flex-wrap gap-3 items-center justify-between mb-3 bg-white p-3 rounded-lg shadow-sm border">
                        <div className="flex flex-wrap gap-3">
                            <input
                                type="text"
                                placeholder="Buscar por Nome, Matrícula ou CPF..."
                                className="border p-2 rounded w-72 shadow-sm"
                                value={busca}
                                onChange={e => setBusca(e.target.value)}
                            />
                            <select
                                className="border p-2 rounded shadow-sm bg-white"
                                value={filtroStatus}
                                onChange={e => setFiltroStatus(e.target.value)}
                            >
                                <option value="Todos">Status: Todos</option>
                                <option value="Pendente">Status: Pendentes</option>
                                <option value="Na fila">Status: Na fila</option>
                                <option value="Impresso">Status: Impressos</option>
                            </select>
                            <select
                                className="border p-2 rounded shadow-sm bg-white"
                                value={filtroMes}
                                onChange={e => setFiltroMes(e.target.value)}
                            >
                                <option value="Todos">Mês: Todos</option>
                                {MESES.map(m => <option key={m.valor} value={m.valor}>{m.nome}</option>)}
                            </select>
                            {filtrosAtivos && (
                                <button
                                    onClick={limparFiltros}
                                    className="px-3 py-2 rounded text-sm font-medium text-gray-500 hover:text-red-600 hover:bg-red-50 transition"
                                >
                                    ✕ Limpar filtros
                                </button>
                            )}
                        </div>
                        <div className="text-sm font-semibold text-gray-600 bg-gray-50 px-4 py-2 rounded shadow-sm">
                            Total: {dados.length} | Pendentes: <span className="text-red-500">{totalPendentes}</span> | Na fila: <span className="text-yellow-600">{totalNaFila}</span> | Impressos: <span className="text-green-600">{totalImpressos}</span>
                        </div>
                    </div>

                    {/* Filtros rápidos: Ano(s) de admissão (múltipla escolha) e Letra inicial do nome */}
                    <div className="flex flex-wrap items-start gap-4 mb-4 bg-white p-3 rounded-lg shadow-sm border">
                        <div className="flex flex-wrap items-center gap-1">
                            <span className="text-xs font-semibold text-gray-400 mr-1">ANO:</span>
                            {anosDisponiveis.length === 0 ? (
                                <span className="text-xs text-gray-400 italic">sem dados</span>
                            ) : anosDisponiveis.map(ano => (
                                <button
                                    key={ano}
                                    onClick={() => toggleAno(ano)}
                                    title="Clique para marcar/desmarcar (pode selecionar vários anos)"
                                    className={`px-2.5 h-7 rounded text-xs font-semibold transition ${filtroAnos.includes(ano) ? 'bg-blue-600 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-600'}`}
                                >{ano}</button>
                            ))}
                        </div>

                        <div className="w-px self-stretch bg-gray-200 hidden sm:block" />

                        <div className="flex flex-wrap items-center gap-1">
                            <span className="text-xs font-semibold text-gray-400 mr-1">LETRA:</span>
                            <button
                                onClick={() => setFiltroLetra('Todos')}
                                className={`px-3 h-7 rounded text-xs font-semibold transition ${filtroLetra === 'Todos' ? 'bg-blue-600 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-600'}`}
                            >Todos</button>
                            {LETRAS.map(letra => {
                                const desabilitada = !letrasDisponiveis.has(letra);
                                return (
                                    <button
                                        key={letra}
                                        onClick={() => setFiltroLetra(letra)}
                                        disabled={desabilitada}
                                        title={desabilitada ? 'Sem registros com esta letra no filtro atual' : undefined}
                                        className={`min-w-[28px] h-7 px-1 rounded text-xs font-semibold transition ${
                                            filtroLetra === letra
                                                ? 'bg-blue-600 text-white'
                                                : desabilitada
                                                    ? 'bg-gray-50 text-gray-300 cursor-not-allowed'
                                                    : 'bg-gray-100 hover:bg-gray-200 text-gray-600'
                                        }`}
                                    >{letra}</button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Tabela de Dados */}
                    <div className="bg-white rounded-lg shadow overflow-hidden mb-20 border">
                        <table className="min-w-full text-left text-sm">
                            <thead className="bg-gray-50 border-b">
                                <tr>
                                    <th className="p-4 w-12">
                                        <input
                                            type="checkbox"
                                            className="w-4 h-4 cursor-pointer"
                                            checked={todosDaPaginaSelecionados}
                                            onChange={toggleTodos}
                                            title="Selecionar todos desta página"
                                        />
                                    </th>
                                    <th className="p-4 font-semibold">Nome do Servidor</th>
                                    <th className="p-4 font-semibold">Matrícula</th>
                                    <th className="p-4 font-semibold">CPF</th>
                                    <th className="p-4 font-semibold">Admissão</th>
                                    <th className="p-4 font-semibold">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {dadosPaginados.length > 0 ? dadosPaginados.map((item) => (
                                    <tr key={item.id} className="border-b hover:bg-gray-50 transition">
                                        <td className="p-4">
                                            <input 
                                                type="checkbox" 
                                                className="w-4 h-4 cursor-pointer"
                                                checked={selecionados.includes(item.id)}
                                                onChange={() => toggleItem(item.id)}
                                            />
                                        </td>
                                        <td className="p-4 font-medium">{item.nome}</td>
                                        <td className="p-4">{item.matricula}</td>
                                        <td className="p-4">{item.cpf}</td>
                                        <td className="p-4">{item.dataAdmissao}</td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${
                                                item.status === 'Impresso' ? 'bg-green-100 text-green-700' :
                                                item.status === 'Na fila' ? 'bg-yellow-100 text-yellow-700' :
                                                'bg-red-100 text-red-700'
                                            }`}>
                                                {item.status}
                                            </span>
                                        </td>
                                    </tr>
                                )) : (
                                    <tr>
                                        <td colSpan="6" className="p-8 text-center text-gray-500">
                                            Nenhum registro encontrado. Carregue uma planilha ou altere os filtros.
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                        {dadosFiltrados.length > 0 && (
                            <div className="flex flex-wrap gap-3 items-center justify-between px-4 py-3 bg-gray-50 border-t text-sm text-gray-600">
                                <span>
                                    Exibindo <strong>{inicioExibicao}</strong>–<strong>{fimExibicao}</strong> de <strong>{dadosFiltrados.length}</strong> registros
                                </span>
                                <Paginacao paginaAtual={paginaAtual} totalPaginas={totalPaginas} onChange={setPaginaAtual} />
                            </div>
                        )}
                    </div>

                    {/* Rodapé Fixo de Ação */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-lg flex justify-between items-center px-10">
                        <div className="text-gray-700 font-medium">
                            <span className="text-blue-600 text-xl font-bold">{selecionados.length}</span> etiquetas selecionadas.
                        </div>
                        <button 
                            onClick={handleImprimir}
                            disabled={loading || selecionados.length === 0}
                            className={`px-8 py-3 rounded text-white font-bold shadow transition ${selecionados.length > 0 && selecionados.length <= 50 ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-400 cursor-not-allowed'}`}
                        >
                            {loading ? 'Processando...' : `🖨️ IMPRIMIR LOTE SELECIONADO`}
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            const [token, setToken] = useState(() => sessionStorage.getItem('token') || null);

            const handleLogin = (novoToken) => {
                sessionStorage.setItem('token', novoToken);
                setToken(novoToken);
            };

            const handleLogout = () => {
                sessionStorage.removeItem('token');
                setToken(null);
            };

            if (!token) return <Login onLogin={handleLogin} />;
            return <Dashboard token={token} onLogout={handleLogout} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
